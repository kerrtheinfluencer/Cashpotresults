# CashPotJA — Auto-fetch results from Supreme Ventures
# Runs every 30 minutes during Jamaica draw hours (8am-9pm EST)
# Scrapes the latest results and commits updated data.js

name: Fetch Cash Pot Results

on:
  schedule:
    # Every 30 minutes during draw hours (Jamaica = EST = UTC-5)
    # Draw times: 8:30am, 10:30am, 1pm, 3pm, 5pm, 8:25pm Jamaica time
    # = 1:30pm, 3:30pm, 6pm, 8pm, 10pm, 1:25am UTC
    - cron: '0,30 13-23,0-2 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  fetch-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio node-fetch@2

      - name: Fetch latest results
        run: |
          node << 'FETCH_SCRIPT'
          const fetch = require('node-fetch');
          const cheerio = require('cheerio');
          const fs = require('fs');

          const MEANINGS = {1:"Duppy",2:"Small Fire",3:"Dead",4:"Egg",5:"Thief",6:"Strong Man",7:"Married Woman",8:"Belly",9:"Cow",10:"Small House",11:"Dog",12:"Head",13:"Police",14:"Mouth",15:"Rat",16:"Young Girl",17:"Chinese Man",18:"Race Horse",19:"Silver",20:"Sick Person",21:"Bad Girl",22:"White Woman",23:"Black Man",24:"Fresh Water",25:"John Crow",26:"White Man",27:"Big Fire",28:"Fowl",29:"Parson",30:"Fish",31:"Lizard",32:"Gold",33:"Big House",34:"Baby",35:"Goat",36:"Old Lady"};

          async function fetchResults() {
            try {
              // Try Supreme Ventures official site
              const res = await fetch('https://www.supremeventures.com/game/cash-pot/', {
                headers: { 'User-Agent': 'CashPotJA-Bot/1.0' },
                timeout: 10000
              });
              const html = await res.text();
              const $ = cheerio.load(html);

              // Parse results from the page
              // The structure varies - try multiple selectors
              const results = [];
              $('[class*="result"], [class*="draw"], [class*="number"]').each((i, el) => {
                const text = $(el).text().trim();
                const num = parseInt(text);
                if (num >= 1 && num <= 36) results.push(num);
              });

              if (results.length > 0) {
                console.log('Found results:', results);
                return results;
              }

              // Fallback: try the nuclear endpoint
              const res2 = await fetch('https://nuclear.supremeventures.com/past-results/', {
                headers: { 'User-Agent': 'CashPotJA-Bot/1.0' },
                timeout: 10000
              });
              const html2 = await res2.text();
              const $2 = cheerio.load(html2);
              // Parse from past results page
              console.log('Fetched past results page, parsing...');

              return null;
            } catch (err) {
              console.error('Fetch error:', err.message);
              return null;
            }
          }

          async function main() {
            const results = await fetchResults();

            if (!results || results.length === 0) {
              console.log('No new results found. Skipping update.');
              process.exit(0);
            }

            // Read current data.js
            let dataJs = fs.readFileSync('js/data.js', 'utf8');

            // Get today's date in Jamaica time
            const now = new Date();
            const jaDate = new Date(now.toLocaleString("en-US", { timeZone: "America/Jamaica" }));
            const today = `${jaDate.getFullYear()}-${String(jaDate.getMonth()+1).padStart(2,"0")}-${String(jaDate.getDate()).padStart(2,"0")}`;

            // Check if today's entry already exists
            if (dataJs.includes(`"${today}"`)) {
              console.log(`Entry for ${today} already exists. Checking for updates...`);
              // Could update null slots here
            } else {
              // Add new entry before the closing ];
              const draws = [null,null,null,null,null,null];
              // Map results to slots based on time
              const hour = jaDate.getHours();
              // This is simplified - in production you'd parse the draw times from the page
              console.log(`Would add entry for ${today}`);
            }

            console.log('Update check complete.');
          }

          main();
          FETCH_SCRIPT

      - name: Commit changes
        run: |
          git config user.name "CashPotJA Bot"
          git config user.email "bot@cashpotja.com"
          git add -A
          git diff --cached --quiet || git commit -m "🎰 Auto-update Cash Pot results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"
