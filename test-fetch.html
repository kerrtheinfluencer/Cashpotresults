<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CashPot Fetch Test v3</title>
<style>body{font-family:monospace;padding:1rem;background:#111;color:#0f0;font-size:12px}pre{white-space:pre-wrap;word-break:break-all;font-size:11px;color:#aaa}.ok{color:#0f0}.err{color:#f00}.warn{color:#ff0}</style>
</head>
<body>
<h2>CashPot Fetch Test v3</h2>
<div id="log"></div>
<script>
const log=document.getElementById('log');
function L(msg,cls='ok'){log.innerHTML+='<div class="'+cls+'">'+msg+'</div>'}

async function run(){
  // The results page loads data via JS, so the HTML shell is empty
  // Let's try the main results page instead which has inline data
  const targets=[
    'https://www.jamaicaindex.com/lottery/jamaica-lotto-results-for-today',
    'https://www.jamaicaindex.com/lottery/results/cash-pot',
  ];
  
  for(const target of targets){
    L('--- Testing: '+target.split('.com')[1],'warn');
    try{
      const resp=await fetch('https://corsproxy.io/?url='+encodeURIComponent(target),{signal:AbortSignal.timeout(15000)});
      if(!resp.ok){L('Status '+resp.status,'err');continue}
      const html=await resp.text();
      L('Got '+html.length+' bytes');
      
      // Search raw HTML for number patterns
      // Look for the actual number values near slot identifiers
      
      // Pattern 1: Look for "EARLYBIRD" near a number in the raw HTML
      const slots=['EARLYBIRD','MORNING','MIDDAY','MIDAFTERNOON','DRIVETIME','EVENING'];
      for(const slot of slots){
        const idx=html.indexOf(slot);
        if(idx>-1){
          // Get 300 chars around it
          const chunk=html.substring(Math.max(0,idx-50),idx+300);
          // Find numbers 1-36 in this chunk
          const nums=[...chunk.matchAll(/>(\d{1,2})</g)].map(m=>parseInt(m[1])).filter(n=>n>=1&&n<=36);
          if(nums.length>0) L(slot+' found numbers in HTML: '+nums.join(', '),'ok');
          else L(slot+' found at pos '+idx+' but no numbers nearby','warn');
        }
      }
      
      // Pattern 2: Search for known meanings in the raw HTML
      const meanings=['Strong Man','Chinese Man','White Woman','Belly','Dead','Duppy','Married Woman'];
      for(const m of meanings){
        const idx=html.indexOf(m);
        if(idx>-1){
          const chunk=html.substring(Math.max(0,idx-100),idx+50);
          const nums=[...chunk.matchAll(/>(\d{1,2})</g)].map(m=>parseInt(m[1])).filter(n=>n>=1&&n<=36);
          if(nums.length>0) L('Found "'+m+'" with number: '+nums.join(', '),'ok');
        }
      }
      
      // Pattern 3: Find ALL instances of >NUMBER< where number is 1-36
      const allNums=[...html.matchAll(/>(\d{1,2})<\/(?:td|span|div|strong|b|h\d)/gi)]
        .map(m=>({num:parseInt(m[1]),pos:m.index}))
        .filter(x=>x.num>=1&&x.num<=36);
      L('Found '+allNums.length+' numbers (1-36) in HTML tags');
      if(allNums.length>0&&allNums.length<50){
        L('Numbers: '+allNums.map(x=>x.num).join(', '));
      }
      
      // Pattern 4: dump 500 chars around first "EARLYBIRD" for inspection
      const ebIdx=html.indexOf('EARLYBIRD');
      if(ebIdx>-1){
        L('Raw HTML around EARLYBIRD:','warn');
        const raw=html.substring(ebIdx,ebIdx+500).replace(/</g,'&lt;').replace(/>/g,'&gt;');
        L('<pre>'+raw+'</pre>');
      }
      
      // Pattern 5: look for JSON data embedded in script tags
      const jsonMatch=html.match(/var\s+\w+\s*=\s*(\[[\s\S]*?\]);/);
      if(jsonMatch) L('Found embedded JSON array!','ok');
      
      const dataMatch=html.match(/"draws?"?\s*:\s*\[/i);
      if(dataMatch) L('Found "draws" key in embedded data!','ok');

    }catch(e){L('Error: '+e.message,'err')}
  }
  L('Done.','warn');
}
run();
</script>
</body>
</html>
